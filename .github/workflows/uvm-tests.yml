name: UVM Test Suite

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Icarus Verilog
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq iverilog

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cocotb pyuvm pytest

    - name: Generate firmware ROM
      run: |
        python rtl/programs/generate_rom.py \
          -f rtl/programs/helloworld/helloworld.bfk \
             rtl/programs/fibonachi/fibonachi.bfk \
             rtl/programs/looptest/looptest.bfk \
          -o firmware.hex --hex --pack

    - name: Verify toolchain
      run: |
        iverilog -V
        python -c "import cocotb; print('cocotb', cocotb.__version__)"

    - name: Run UVM regression
      run: |
        cd tb
        make regression

    - name: Summary
      if: always()
      run: |
        echo "COCOTB_RESULTS_FILE not supported in make regression; results shown above"
