name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker image
      run: docker build . --file Dockerfile --tag dekatron-pc-ci:latest
    - name: Save Docker image
      run: docker save dekatron-pc-ci:latest -o /tmp/image.tar
    - uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: /tmp/image.tar
        retention-days: 1

  sim:
    needs: build-image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: docker-image
        path: /tmp
    - name: Load Docker image
      run: docker load -i /tmp/image.tar
    - name: Run RTL simulation
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/var/rtl/run \
          dekatron-pc-ci:latest \
          bash -c "cd /var/rtl/run/rtl/run && ./run_tests.sh -t"

  synt:
    needs: build-image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: docker-image
        path: /tmp
    - name: Load Docker image
      run: docker load -i /tmp/image.tar
    - name: Run synthesis
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/var/rtl/run \
          dekatron-pc-ci:latest \
          bash -c "source /var/venv/bin/activate && cd /var/rtl/run/rtl/run && ./run_tests.sh -s"
